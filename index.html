<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Reading Room</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Display&family=Playwrite+NZ+Guides&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="d-flex justify-content-center mx-auto vh-100 pt-2">
    <div class="w-75 border px-4">
      <section class="text-center mb-5">
        <h1 class="titlecolour pt-2 noto-sans-display playwrite-nz-guides-regular">The Reading Room</h1>
      </section>

      <!-- inputan judul buku -->
      <section id="form_input_book">
        <form>
          <div class="mb-3 row">
            <label for="input_book" class="form-label col-sm-2 col-form-label fw-bold">Book Title</label>
            <div class="col-sm-10">
              <input type="text" class="form-control d-inline-flex focus-ring focus-ring-secondary py-1 px-2 text-decoration-none border rounded-2" id="input_book">
              <div id="input_book_help" class="form-text">
              </div>
            </div>
          </div>

          <div class="mb-3 row">
            <label for="book_creator" class="form-label col-sm-2 col-form-label fw-bold">Book Creator</label>
            <div class="col-sm-10">
              <input type="text" class="form-control d-inline-flex focus-ring focus-ring-secondary py-1 px-2 text-decoration-none border rounded-2" id="book_creator">
              <div id="input_creator_help" class="form-text"></div>
            </div>
          </div>

          <!-- buat submit buku -->
          <div class="text-end py-2">
            <button type="submit" class="btn border px-3">Add List</button>
          </div>
        </form>
      </section>

      <section id="book_list" class="mt-3 container">
        <div class="row mb-4">
          <div class="col-5"><input class="form-label form-control fst-italic border border-1 d-inline-flex focus-ring focus-ring-secondary py-1 px-2 text-decoration-none border rounded-2" type="text"
              placeholder="Search book" aria-label="default input example" id="search_input"></div>
          <div class="col-7 text-center"></div>
        </div>

        <div style="max-height: 400px;" class="overflow-y-auto">
          <div style="grid-template-columns: repeat(4, 150px); justify-content: center;" class="d-grid gap-3">
          </div>
        </div>


    </div>
    </div>
    </section>

  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

  <script>
    let form = document.querySelector("form");
    let inputBook = document.getElementById("input_book");
    let inputCreator = document.getElementById("book_creator");
    let grid = document.querySelector(".d-grid");
    let validationBook = document.getElementById("input_book_help");
    let validationCreator = document.getElementById("input_creator_help");
    let searchInput = document.getElementById("search_input")

    function removeChild() {
      if (validationBook.firstElementChild) {

        validationBook.removeChild(validationBook.firstElementChild)
      }
      if (validationCreator.firstElementChild) {
        validationCreator.removeChild(validationCreator.firstElementChild)

      }
    }

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      validationBook.innerHTML = ""
      validationCreator.innerHTML = ""
      let bookTitle = inputBook.value;
      let creator = inputCreator.value;

      if (bookTitle === "") {
        validationBook.innerHTML = `<p class="fst-italic old-brown-text">Book title is empty, please fill in</p>`;
        inputBook.parentElement.appendChild(validationBook);
        return
      } else if (creator === "") {
        validationCreator.innerHTML = `<p class="fst-italic old-brown-text">Book creator is empty, please fill in</p>`;
        inputCreator.parentElement.appendChild(validationCreator);
        return
      }

      let books = JSON.parse(localStorage.getItem("books")) || [];

      let newBook = {
        title: bookTitle,
        creator: creator,
      };

      books.push(newBook);
      localStorage.setItem("books", JSON.stringify(books));

      inputBook.value = "";
      inputCreator.value = "";

      renderItem();
      removeChild()
    });

    function renderItem() {
      let books = JSON.parse(localStorage.getItem("books")) || [];

      grid.innerHTML = "";

      for (let i = 0; i < books.length; i++) {
        let book = books[i];

        grid.innerHTML += `
        <div class="card position-relative border border-1 border-dark p-2 shadow-sm white-brown" data-index="${i}">
          <div class="card-header fw-bold old-brown text-white text-center">${book.title.toUpperCase()}</div> 
          <div class="card-body fst-italic">${book.creator}</div>
          <div class="d-flex flex-column">
          <button onclick="toggleDone(this)" class="btn btn-success btn-sm m-1">Done</button>
          <button onclick="deleteCard(this)" class="btn btn-danger btn-sm m-1">Delete</button>
          </div>
        </div>
      `;

      }
    }

    searchInput.addEventListener("input", function () {
      let keyword = this.value.toLowerCase();
      let cards = grid.querySelectorAll(".card");

      cards.forEach(function (card) {
        let title = card.querySelector(".card-header").innerText.toLowerCase();
        let creator = card.querySelector(".card-body").innerText.toLowerCase();

        if (title.includes(keyword) || creator.includes(keyword)) {
          card.style.display = "flex";
        } else {
          card.style.display = "none";
        }
      });
    });

    renderItem();

    function toggleDone(btn) {
      if (btn.innerText === "Done") {
        btn.innerText = "Not Done";
        btn.classList.remove("btn-success");
        btn.classList.add("btn-secondary");
      } else {
        btn.innerText = "Done";
        btn.classList.remove("btn-secondary");
        btn.classList.add("btn-success");
      }
    }

    function deleteCard(btn) {
      let card = btn.closest(".card");
      let index = card.getAttribute("data-index");

      let books = JSON.parse(localStorage.getItem("books")) || [];

      let textConfirm = `Are you sure delete "${books[index].title}" book??`;

      if (confirm(textConfirm)) {
        books.splice(index, 1);
        localStorage.setItem("books", JSON.stringify(books));
        renderItem();
      }
    }
  </script>


</body>

</html>
